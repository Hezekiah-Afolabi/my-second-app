<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08001f"/>
      <stop offset="100%" stop-color="#120030"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="48" x2="192" y2="48" stroke="#25D366" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="96" x2="192" y2="96" stroke="#25D366" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="0" y1="144" x2="192" y2="144" stroke="#25D366" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="48" y1="0" x2="48" y2="192" stroke="#25D366" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="96" y1="0" x2="96" y2="192" stroke="#25D366" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="144" y1="0" x2="144" y2="192" stroke="#25D366" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Border glow -->
  <rect width="192" height="192" rx="32" fill="none" stroke="#25D366" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- RR monogram -->
  <text x="96" y="112" font-family="'JetBrains Mono', monospace" font-weight="700"
    font-size="72" text-anchor="middle" fill="url(#glow)" filter="url(#neon)">RR</text>

  <!-- SYNTHORYNE label -->
  <text x="96" y="148" font-family="monospace" font-weight="600"
    font-size="11" letter-spacing="3" text-anchor="middle" fill="#25D366" opacity="0.7">SYNTHORYNE</text>

  <!-- Accent line -->
  <line x1="40" y1="158" x2="152" y2="158" stroke="#25D366" stroke-opacity="0.3" stroke-width="1"/>
</svg>
