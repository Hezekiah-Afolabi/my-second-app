<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08001f"/>
      <stop offset="100%" stop-color="#120030"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#25D366"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
    <radialGradient id="blob" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#dc00b4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#08001f" stop-opacity="0"/>
    </radialGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Aurora blob -->
  <ellipse cx="150" cy="150" rx="220" ry="180" fill="url(#blob)"/>

  <!-- Grid lines -->
  <line x1="0" y1="128" x2="512" y2="128" stroke="#25D366" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="256" x2="512" y2="256" stroke="#25D366" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="0" y1="384" x2="512" y2="384" stroke="#25D366" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="128" y1="0" x2="128" y2="512" stroke="#25D366" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#25D366" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="384" y1="0" x2="384" y2="512" stroke="#25D366" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Border -->
  <rect width="512" height="512" rx="80" fill="none" stroke="#25D366" stroke-opacity="0.35" stroke-width="2"/>

  <!-- SYNTHORYNE top label -->
  <text x="256" y="148" font-family="monospace" font-weight="700"
    font-size="26" letter-spacing="8" text-anchor="middle" fill="#25D366" opacity="0.6">SYNTHORYNE</text>

  <!-- Divider -->
  <line x1="80" y1="164" x2="432" y2="164" stroke="#25D366" stroke-opacity="0.2" stroke-width="1"/>

  <!-- RR monogram -->
  <text x="256" y="330" font-family="'JetBrains Mono', monospace" font-weight="700"
    font-size="190" text-anchor="middle" fill="url(#glow)" filter="url(#neon)">RR</text>

  <!-- ReadRight label -->
  <line x1="80" y1="368" x2="432" y2="368" stroke="#25D366" stroke-opacity="0.2" stroke-width="1"/>
  <text x="256" y="400" font-family="monospace" font-weight="600"
    font-size="30" letter-spacing="12" text-anchor="middle" fill="#25D366" opacity="0.9">READRIGHT</text>
</svg>
